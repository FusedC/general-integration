name: Daily Data Fetch

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Create credentials.json
      run: |
        echo "${{ secrets.GOOGLE_CREDENTIALS_BASE64 }}" | base64 -d > credentials.json
        chmod 600 credentials.json
    
    - name: Run fetch scripts
      env:
        MS_TOKEN: ${{ secrets.MS_TOKEN }}
        MP_API_KEY: ${{ secrets.MP_API_KEY }}
        IP_API_URL: ${{ secrets.IP_API_URL }}
        IP_API_USER: ${{ secrets.IP_API_USER }}
        IP_API_PASS: ${{ secrets.IP_API_PASS }}
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      run: |
        python fetch_ip.py
        python add_subcategories_to_ip.py
        python fetch_mp.py
        python import_to_sheets.py
    
    - name: Upload output
      uses: actions/upload-artifact@v4
      with:
        name: output-data
        path: output/
        retention-days: 7
